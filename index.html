<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>面接コーチ | 影子跟读 & 模拟面试</title>
<style>
  :root {
    --bg: #eef0f4;
    --surface: #ffffff;
    --tint: #f2f4f7;
    --ink: #161e2e;
    --ink-soft: #424b59;
    --sub: #5d6675;
    --faint: #99a1af;
    --border: #e6e9ee;
    --border-strong: #d4d9e0;
    --blue: #2f6bff;
    --blue-ink: #1f4fd6;
    --blue-soft: #e8eeff;
    --grad-blue: linear-gradient(135deg, #5b8cff 0%, #2f6bff 100%);
    --rec: #f4502c;
    --green: #16a06b;
    --r-sm: 10px;
    --r-md: 14px;
    --r-lg: 18px;
    --shadow-sm: 0 1px 2px rgba(18,25,38,.05), 0 4px 12px -6px rgba(18,25,38,.06);
    --shadow-card: 0 1px 2px rgba(18,25,38,.04), 0 12px 32px -14px rgba(18,25,38,.22);
    --shadow-lg: 0 -8px 32px rgba(18,25,38,.16);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", "PingFang SC", system-ui, sans-serif;
    font-size: 15px;
    color: var(--ink); line-height: 1.65;
    background: radial-gradient(900px 380px at 50% -100px, #dbe6ff 0%, rgba(238,240,244,0) 65%), var(--bg);
    background-attachment: fixed;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }
  svg.ic { width: 17px; height: 17px; stroke: currentColor; stroke-width: 1.7; fill: none;
    stroke-linecap: round; stroke-linejoin: round; flex: none; vertical-align: -3px; }

  /* ---------- app frame ---------- */
  #app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; max-width: 760px; margin: 0 auto; }
  main { flex: 1; min-height: 0; position: relative; }
  .view { height: 100%; }

  /* ---------- top bar ---------- */
  .top { padding: 12px 18px 0; flex: none; }
  .toprow { display: flex; align-items: center; gap: 10px; min-height: 36px; }
  .toprow h1 { font-size: 16px; font-weight: 700; margin-right: auto; }
  .iconbtn {
    border: none; background: transparent; color: var(--sub); cursor: pointer;
    width: 36px; height: 36px; border-radius: var(--r-sm); display: inline-flex;
    align-items: center; justify-content: center; transition: all .15s; flex: none;
  }
  .iconbtn:hover { background: var(--surface); color: var(--blue); }
  .counter {
    border: none; background: transparent; color: var(--sub); cursor: pointer;
    font-size: 13px; font-weight: 600; font-variant-numeric: tabular-nums;
    padding: 7px 10px; border-radius: var(--r-sm); display: inline-flex; align-items: center; gap: 6px;
  }
  .counter:hover { background: var(--surface); color: var(--blue); }
  .chips { display: flex; gap: 7px; overflow-x: auto; padding: 10px 0 12px; scrollbar-width: none; }
  .chips::-webkit-scrollbar { display: none; }
  .chip {
    border: none; background: var(--surface); color: var(--sub); box-shadow: var(--shadow-sm);
    padding: 8px 15px; border-radius: 999px; cursor: pointer; font-size: 13.5px; font-weight: 500;
    white-space: nowrap; transition: all .15s; flex: none;
  }
  .chip.active { background: var(--grad-blue); color: #fff; font-weight: 600; box-shadow: 0 4px 12px -4px rgba(47,107,255,.5); }

  /* ---------- card deck (跟读) ---------- */
  #shadowView { display: flex; flex-direction: column; }
  .deck {
    flex: 1; min-height: 0; display: flex; gap: 12px;
    overflow-x: auto; overflow-y: hidden;
    scroll-snap-type: x mandatory;
    padding: 12px 0 14px;
    scrollbar-width: none;
  }
  .deck::-webkit-scrollbar { display: none; }
  .card {
    flex: 0 0 calc(100% - 48px); min-width: 0;
    scroll-snap-align: center; scroll-snap-stop: always;
    background: var(--surface); border-radius: var(--r-lg);
    box-shadow: var(--shadow-card);
    display: flex; flex-direction: column; min-height: 0;
    padding: 22px 20px 18px;
    transition: box-shadow .2s;
  }
  .card:first-child { margin-left: 24px; }
  .card:last-child { margin-right: 24px; }
  .card.playing { box-shadow: 0 0 0 2px var(--blue), var(--shadow-card); }
  .card-top { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; flex: none; }
  .qnum { color: var(--blue); font-weight: 700; font-size: 12.5px; letter-spacing: .5px; }
  .badge {
    font-size: 11px; padding: 3px 10px; border-radius: 999px; white-space: nowrap;
    background: var(--tint); color: var(--faint); display: inline-flex; align-items: center; gap: 4px;
    margin-left: auto; font-weight: 600;
  }
  .badge svg { width: 11px; height: 11px; stroke-width: 2.4; }
  .badge.hq { background: #e2f6ec; color: var(--green); }
  .card-q { font-size: 19px; line-height: 1.7; font-weight: 700; flex: none; }
  .card-ctrl { display: flex; gap: 16px; margin: 20px 0 16px; align-items: center; justify-content: center; flex: none; }
  .card-ans {
    flex: 1; min-height: 0; overflow-y: auto;
    border-top: 1px solid var(--border);
    padding: 14px 2px 6px; font-size: 15px; line-height: 1.95; white-space: pre-wrap; color: var(--ink-soft);
    -webkit-overflow-scrolling: touch;
  }
  .card-ans.placeholder { color: var(--faint); }
  .ans-label { display: block; font-size: 10.5px; font-weight: 700; letter-spacing: 2px; margin-bottom: 8px; color: var(--faint); }
  /* 分页圆点 */
  .dots { display: flex; gap: 6px; justify-content: center; align-items: center; padding: 2px 16px 12px; flex: none; flex-wrap: wrap; }
  .dots button {
    width: 6px; height: 6px; border-radius: 3px; border: none; padding: 0; cursor: pointer;
    background: var(--border-strong); transition: all .22s ease-out;
  }
  .dots button.on { width: 20px; background: var(--blue); }
  .deck-arrow {
    display: none; position: absolute; top: 50%; transform: translateY(-50%); z-index: 4;
    width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--border-strong);
    background: var(--surface); color: var(--sub); cursor: pointer;
    align-items: center; justify-content: center; box-shadow: var(--shadow-md);
  }
  .deck-arrow:hover { color: var(--blue); border-color: var(--blue); }
  .deck-arrow.prev { left: 4px; }
  .deck-arrow.next { right: 4px; }
  @media (hover: hover) and (min-width: 700px) { .deck-arrow { display: inline-flex; } }

  /* ---------- buttons ---------- */
  .btn {
    border: 1px solid var(--border-strong); background: #fff; padding: 10px 15px; border-radius: var(--r-sm);
    cursor: pointer; font-size: 14px; color: var(--ink); transition: all .15s; font-weight: 500;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-soft); }
  .btn.primary { background: var(--grad-blue); border-color: transparent; color: #fff; font-weight: 600; box-shadow: 0 4px 12px -4px rgba(47,107,255,.5); }
  .btn.primary:hover { color: #fff; filter: brightness(1.06); }
  .btn.rec { background: var(--rec); border-color: transparent; color: #fff; font-weight: 600; }
  .btn.rec:hover { color: #fff; background: #d83e1d; }
  .btn.rec.on { animation: pulse 1.3s infinite; }
  .btn:disabled { opacity: .45; cursor: not-allowed; }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(244,80,44,.45);} 50% { box-shadow: 0 0 0 8px rgba(244,80,44,0);} }

  /* 纯图标圆形操作键 */
  .ibtn {
    width: 46px; height: 46px; border-radius: 50%; border: none;
    background: var(--tint); color: var(--ink-soft); cursor: pointer; transition: all .15s;
    display: inline-flex; align-items: center; justify-content: center; flex: none;
  }
  .ibtn svg.ic { width: 19px; height: 19px; vertical-align: 0; }
  .ibtn:hover { color: var(--blue); background: var(--blue-soft); }
  .ibtn.big { width: 58px; height: 58px; }
  .ibtn.big svg.ic { width: 24px; height: 24px; }
  .ibtn.primary { background: var(--grad-blue); color: #fff; box-shadow: 0 6px 16px -4px rgba(47,107,255,.5); }
  .ibtn.primary:hover { filter: brightness(1.06); color: #fff; }
  .ibtn.toggled { background: var(--blue-soft); color: var(--blue); box-shadow: inset 0 0 0 1.5px var(--blue); }
  .ibtn.rec { background: var(--rec); border-color: transparent; color: #fff; }
  .ibtn.rec:hover { background: #c04325; color: #fff; }
  .ibtn.rec.on {
    width: auto; min-width: 46px; border-radius: 999px; padding: 0 16px; gap: 7px;
    font-size: 14px; font-weight: 600; animation: pulse 1.3s infinite;
  }
  .ibtn:disabled { opacity: .45; cursor: not-allowed; }

  /* ---------- bottom nav ---------- */
  nav.bottom {
    flex: none; display: flex; background: rgba(255,255,255,.88);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
    padding-bottom: env(safe-area-inset-bottom);
  }
  nav.bottom button {
    flex: 1; border: none; background: transparent; cursor: pointer; color: var(--faint);
    padding: 9px 0 7px; font-size: 11.5px; font-weight: 600;
    display: flex; flex-direction: column; align-items: center; gap: 3px; transition: color .15s;
  }
  nav.bottom button svg { width: 21px; height: 21px; stroke-width: 1.8; }
  nav.bottom button.active { color: var(--blue); }

  /* ---------- bottom sheet ---------- */
  .scrim {
    position: fixed; inset: 0; background: rgba(16,24,40,.35); z-index: 20;
    opacity: 0; pointer-events: none; transition: opacity .22s;
  }
  .scrim.open { opacity: 1; pointer-events: auto; }
  .sheet {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 21;
    max-width: 760px; margin: 0 auto;
    background: var(--surface); border-radius: var(--r-lg) var(--r-lg) 0 0;
    box-shadow: var(--shadow-lg); max-height: 72vh; max-height: 72dvh;
    display: flex; flex-direction: column;
    transform: translateY(102%); transition: transform .26s cubic-bezier(.32,.72,.33,1);
    padding-bottom: env(safe-area-inset-bottom);
  }
  .sheet.open { transform: none; }
  .sheet-head { padding: 14px 20px 10px; flex: none; display: flex; align-items: center; }
  .sheet-head::before {
    content: ""; position: absolute; top: 7px; left: 50%; transform: translateX(-50%);
    width: 36px; height: 4px; border-radius: 2px; background: var(--border-strong);
  }
  .sheet-head h3 { font-size: 15px; font-weight: 700; }
  .sheet-body { overflow-y: auto; padding: 4px 20px 24px; -webkit-overflow-scrolling: touch; }
  @media (prefers-reduced-motion: reduce) { .sheet, .scrim, .progressbar i { transition: none; } }

  /* 总览列表 */
  .ov-item {
    width: 100%; text-align: left; border: 1px solid var(--border); background: var(--surface);
    border-radius: var(--r-md); padding: 11px 13px; margin-bottom: 8px; cursor: pointer;
    display: flex; align-items: center; gap: 10px; font-size: 14px; color: var(--ink-soft); transition: all .15s;
  }
  .ov-item:hover { border-color: var(--blue); }
  .ov-item.current { border-color: var(--blue); background: var(--blue-soft); }
  .ov-item .n { color: var(--blue); font-weight: 700; font-size: 12.5px; flex: none; width: 30px; }
  .ov-item .t { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ov-item .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border-strong); flex: none; }
  .ov-item .dot.ok { background: var(--green); }

  /* 播放设置 */
  .set-row { display: flex; align-items: center; justify-content: space-between; gap: 14px; padding: 13px 0; border-bottom: 1px solid var(--border); font-size: 14.5px; color: var(--ink-soft); }
  .set-row:last-child { border-bottom: none; }
  .set-row input[type=range] { width: 150px; accent-color: var(--blue); }
  .set-row select { padding: 7px 11px; border: 1px solid var(--border-strong); border-radius: var(--r-sm); background: #fff; color: var(--ink); font-size: 14px; }
  .set-row .val { color: var(--blue); font-weight: 600; min-width: 38px; text-align: right; font-variant-numeric: tabular-nums; }

  /* ---------- interview ---------- */
  #interviewView { display: flex; flex-direction: column; overflow-y: auto; padding: 12px 18px 18px; }
  .panel {
    background: var(--surface); border: none; border-radius: var(--r-md);
    padding: 14px 16px; box-shadow: var(--shadow-sm); margin-bottom: 14px;
    display: flex; gap: 12px 20px; flex-wrap: wrap; align-items: center; font-size: 14px; flex: none;
  }
  .panel label { display: flex; align-items: center; gap: 8px; color: var(--sub); }
  .panel select { padding: 6px 10px; border: 1px solid var(--border-strong); border-radius: var(--r-sm); background: #fff; color: var(--ink); font-size: 14px; }
  .panel input[type=checkbox] { accent-color: var(--blue); width: 16px; height: 16px; }
  .flashcard {
    background: var(--surface); border: none; border-radius: var(--r-lg);
    padding: 30px 22px 24px; text-align: center; margin: 10px 0 12px; box-shadow: var(--shadow-card);
  }
  .fc-school { font-size: 12px; letter-spacing: 1px; margin-bottom: 14px; font-weight: 600; color: var(--blue); }
  .fc-q { font-size: 19px; line-height: 1.75; min-height: 60px; font-weight: 600; }
  .fc-progress { font-size: 13px; color: var(--faint); text-align: center; }
  .fc-btns { display: flex; gap: 9px; justify-content: center; flex-wrap: wrap; margin-top: 22px; }
  .flashcard .answer {
    text-align: left; margin-top: 18px; padding: 14px 16px;
    background: var(--tint); border-radius: var(--r-sm);
    font-size: 15px; line-height: 1.9; white-space: pre-wrap; color: var(--ink-soft);
  }
  .answer.hide { display: none; }
  .transcript {
    margin-top: 16px; padding: 13px 15px; background: var(--tint); border: 1px solid var(--border); border-radius: var(--r-sm);
    font-size: 14px; color: var(--ink-soft); text-align: left; min-height: 44px; display: none; line-height: 1.7;
  }
  .transcript.show { display: block; }
  .transcript .interim { color: var(--faint); }
  .takes { margin-top: 14px; text-align: left; }
  .take {
    display: flex; align-items: center; gap: 10px; background: var(--tint);
    border: 1px solid var(--border); border-radius: var(--r-sm); padding: 9px 13px; margin-top: 8px; font-size: 13px;
  }
  .take .tnum { color: var(--blue); font-weight: 600; white-space: nowrap; }
  .take audio { height: 34px; flex: 1; min-width: 0; }
  .take a { color: var(--blue); text-decoration: none; white-space: nowrap; font-weight: 500; display: inline-flex; align-items: center; gap: 5px; }
  .rec-timer { font-variant-numeric: tabular-nums; font-weight: 700; }

  /* ---------- guide (回答思路) ---------- */
  #guideView { overflow-y: auto; padding: 12px 18px 24px; -webkit-overflow-scrolling: touch; }
  .g-head { margin: 0 0 16px; padding: 18px 20px; border-radius: var(--r-md); background: var(--surface); box-shadow: var(--shadow-sm); }
  .g-head h2 { font-size: 17px; margin-bottom: 8px; color: var(--ink); display: flex; align-items: center; gap: 9px; }
  .g-head h2 svg { width: 19px; height: 19px; stroke: var(--blue); }
  .g-head p { font-size: 14px; color: var(--sub); line-height: 1.8; }
  .g-toc {
    display: flex; gap: 8px; flex-wrap: wrap; margin: 0 0 8px; position: sticky; top: -12px; z-index: 5;
    background: rgba(244,245,247,.94); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    padding: 12px 0; border-bottom: 1px solid var(--border);
  }
  .g-toc a {
    font-size: 13px; color: var(--sub); text-decoration: none; background: var(--surface);
    border: 1px solid var(--border-strong); border-radius: 999px; padding: 7px 13px; transition: all .12s; font-weight: 500;
  }
  .g-toc a:hover { border-color: var(--blue); color: var(--blue); }
  .g-toc .btn { padding: 7px 13px; font-size: 13px; }
  .g-chapter { margin-top: 28px; }
  .g-chapter > h3 { font-size: 16px; display: flex; align-items: center; gap: 10px; margin-bottom: 13px; scroll-margin-top: 64px; font-weight: 700; }
  .g-chapter > h3 .cnum {
    background: var(--blue-soft); color: var(--blue); font-size: 13px; width: 24px; height: 24px; border-radius: 6px;
    display: inline-flex; align-items: center; justify-content: center; flex: none; font-weight: 700;
  }
  details.g-item {
    background: var(--surface); border-radius: var(--r-md);
    margin-bottom: 9px; overflow: hidden; box-shadow: var(--shadow-sm);
  }
  details.g-item[open] { box-shadow: var(--shadow-card); }
  details.g-item summary {
    cursor: pointer; list-style: none; padding: 14px 16px; font-size: 15px; font-weight: 600;
    display: flex; align-items: center; gap: 10px;
  }
  details.g-item summary::-webkit-details-marker { display: none; }
  details.g-item summary .gq {
    color: var(--blue); font-size: 12px; font-weight: 600; white-space: nowrap;
    background: var(--blue-soft); border-radius: 999px; padding: 3px 10px;
  }
  details.g-item summary .arrow { margin-left: auto; color: var(--faint); transition: transform .15s; display: flex; }
  details.g-item summary .arrow svg { width: 15px; height: 15px; }
  details.g-item[open] summary .arrow { transform: rotate(90deg); }
  .g-body { padding: 2px 16px 16px; border-top: 1px solid var(--border); }
  .g-row { display: flex; flex-direction: column; gap: 4px; margin-top: 13px; font-size: 14px; line-height: 1.75; }
  .g-tag {
    align-self: flex-start; font-size: 11px; font-weight: 600; border-radius: 999px; padding: 3px 10px;
    background: var(--tint); color: var(--sub); white-space: nowrap;
  }
  .g-tag.intent { background: var(--blue-soft); color: var(--blue); }
  .g-row .g-lines > div { margin-bottom: 2px; }
  .g-ja-line { display: flex; align-items: baseline; gap: 8px; }
  .g-ja-line span { font-weight: 600; }
  .g-ja-line .play { border: none; background: none; cursor: pointer; padding: 0 2px; flex: none; color: var(--blue); transition: transform .12s; display: inline-flex; }
  .g-ja-line .play:hover { transform: scale(1.15); }
  .g-ja-line .play svg { width: 15px; height: 15px; }
  .g-block { margin-top: 15px; }
  .g-block h4 {
    font-size: 13px; color: var(--blue); background: var(--blue-soft);
    display: inline-block; padding: 4px 11px; border-radius: 6px; margin-bottom: 9px; font-weight: 600;
  }
  .g-block p, .g-block li { font-size: 14px; line-height: 1.9; color: var(--ink-soft); }
  .g-block ol, .g-block ul { padding-left: 21px; }
  .g-block ul.sub { padding-left: 16px; margin: 2px 0 8px; list-style: none; }
  .g-block ul.sub li { color: var(--sub); font-size: 13px; position: relative; padding-left: 14px; }
  .g-block ul.sub li::before { content: ""; position: absolute; left: 0; top: 11px; width: 5px; height: 5px; border-radius: 50%; background: var(--border-strong); }
  .g-block b { color: var(--blue-ink); font-weight: 700; }

  .hint { font-size: 13px; color: var(--faint); margin-top: 8px; line-height: 1.7; text-align: center; flex: none; }
  .empty { text-align: center; color: var(--sub); padding: 56px 0; font-size: 14px; }
  .empty .big { display: flex; justify-content: center; margin-bottom: 14px; color: var(--border-strong); }
  .empty .big svg { width: 40px; height: 40px; stroke-width: 1.5; }
  #toast {
    position: fixed; bottom: 84px; left: 50%; transform: translateX(-50%); z-index: 30;
    background: var(--ink); color: #fff; padding: 11px 20px; border-radius: var(--r-sm);
    font-size: 14px; opacity: 0; pointer-events: none; transition: opacity .25s;
    box-shadow: 0 8px 24px rgba(16,24,40,.2); max-width: 86vw;
  }
  #toast.show { opacity: 1; }
</style>
</head>
<body>
<div id="app">
  <div class="top">
    <div class="toprow">
      <h1 id="topTitle">面接コーチ</h1>
      <button class="counter" id="counterBtn" onclick="openSheet('overview')" title="题目总览"></button>
      <button class="iconbtn" id="gearBtn" onclick="openSheet('settings')" title="播放设置"></button>
    </div>
    <div class="chips" id="chips"></div>
  </div>

  <main>
    <!-- ============ 跟读：卡片组 ============ -->
    <section class="view" id="shadowView">
      <div class="deck" id="deck"></div>
      <div class="dots" id="dots"></div>
      <button class="deck-arrow prev" onclick="goTo(S.idx-1)" aria-label="上一题"></button>
      <button class="deck-arrow next" onclick="goTo(S.idx+1)" aria-label="下一题"></button>
    </section>

    <!-- ============ 模拟面试 ============ -->
    <section class="view" id="interviewView" style="display:none">
      <div class="panel">
        <label>抽题范围 <select id="scope">
          <option value="current">当前学校</option><option value="all">全部学校</option></select></label>
        <label><input type="checkbox" id="autoRec"> 读完问题后自动录音</label>
        <label><input type="checkbox" id="liveStt" onchange="el('transcript').classList.toggle('show', this.checked)"> 实时识别字幕（仅Chrome）</label>
        <button class="btn primary" id="startBtn" onclick="startInterview()"></button>
      </div>
      <div id="ivStage" style="display:none">
        <p class="fc-progress" id="fcProgress"></p>
        <div class="flashcard">
          <div class="fc-school" id="fcSchool"></div>
          <div class="fc-q" id="fcQ"></div>
          <div class="fc-btns" id="fcBtns"></div>
          <div class="answer hide" id="ivAnswerBox"><span class="ans-label">MY ANSWER</span><div id="ivAnswer"></div></div>
          <div class="transcript" id="transcript"></div>
          <div class="takes" id="takes"></div>
        </div>
        <p class="hint">录音仅保存在本次会话中，关闭页面会丢失，想保留请点「下载」。</p>
      </div>
      <div class="empty" id="ivEmpty"><span class="big" id="emptyIcon"></span>点击「开始 / 重新抽题」，随机抽取问题开始模拟面试</div>
    </section>

    <!-- ============ 回答思路 ============ -->
    <section class="view" id="guideView" style="display:none"></section>
  </main>

  <nav class="bottom" id="bottomNav">
    <button id="navShadow" class="active" onclick="setMode('shadow')"></button>
    <button id="navInterview" onclick="setMode('interview')"></button>
    <button id="navGuide" onclick="setMode('guide')"></button>
  </nav>
</div>

<!-- ============ 抽屉 ============ -->
<div class="scrim" id="scrim" onclick="closeSheets()"></div>
<div class="sheet" id="sheet-overview">
  <div class="sheet-head"><h3 id="ovTitle">题目总览</h3></div>
  <div class="sheet-body" id="ovBody"></div>
</div>
<div class="sheet" id="sheet-settings">
  <div class="sheet-head"><h3>播放设置</h3></div>
  <div class="sheet-body">
    <div class="set-row">语速
      <span style="display:flex;align-items:center;gap:10px">
        <input type="range" id="rate" min="0.6" max="1.3" step="0.05" value="1"
          oninput="S.rate=+this.value; el('rateVal').textContent=this.value+'x'">
        <span class="val" id="rateVal">1x</span></span>
    </div>
    <div class="set-row">重复次数
      <select id="repeat" onchange="S.repeat=+this.value">
        <option>1</option><option selected>3</option><option>5</option><option>10</option></select>
    </div>
    <div class="set-row">跟读间隔
      <select id="gap" onchange="S.gap=+this.value">
        <option value="1">1秒</option><option value="2" selected>2秒</option>
        <option value="3">3秒</option><option value="5">5秒</option></select>
    </div>
    <div class="set-row"><span>停止所有播放</span><button class="btn" id="stopAllBtn" onclick="stopAll()"></button></div>
  </div>
</div>
<div id="toast"></div>

<script src="data/questions.js"></script>
<script src="data/guide.js"></script>
<script>
const DATA = window.INTERVIEW_DATA;
const el = id => document.getElementById(id);
const S = { mode: 'shadow', school: DATA.schools[0].id, idx: 0, rate: 1, repeat: 3, gap: 2 };
const audioKind = {};
const AUDIO_CACHE_BUST = Date.now();
let playToken = 0;
let currentAudio = null;
let guideRendered = false;

/* ---------- 图标（统一细线 SVG） ---------- */
const PATHS = {
  play: '<polygon points="6 4 20 12 6 20 6 4"/>',
  stop: '<rect x="6" y="6" width="12" height="12" rx="2"/>',
  volume: '<path d="M11 5 6 9H3v6h3l5 4z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M18.5 6a9 9 0 0 1 0 12"/>',
  eye: '<path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/>',
  mic: '<rect x="9" y="3" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0 0 14 0"/><line x1="12" y1="18" x2="12" y2="22"/>',
  download: '<path d="M12 3v12"/><path d="m7 11 5 5 5-5"/><path d="M5 21h14"/>',
  sparkle: '<path d="M12 3l1.7 5.3L19 10l-5.3 1.7L12 17l-1.7-5.3L5 10l5.3-1.7z"/>',
  repeat: '<path d="M17 2l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><path d="M7 22l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>',
  chat: '<path d="M21 11.5a8.4 8.4 0 0 1-8.5 8.5 8.5 8.5 0 0 1-3.8-.9L3 21l1.9-5.7A8.4 8.4 0 0 1 4 11.5 8.5 8.5 0 0 1 12.5 3 8.4 8.4 0 0 1 21 11.5z"/>',
  book: '<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>',
  check: '<path d="M20 6 9 17l-5-5"/>',
  arrow: '<path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>',
  chevron: '<path d="m9 6 6 6-6 6"/>',
  chevL: '<path d="m15 6-6 6 6 6"/>',
  loop: '<path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/>',
  grid: '<rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>',
  sliders: '<line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/>'
};
function ic(name) { return `<svg class="ic" viewBox="0 0 24 24" aria-hidden="true">${PATHS[name]}</svg>`; }

/* 注入静态按钮图标 */
el('gearBtn').innerHTML = ic('sliders');
el('navShadow').innerHTML = ic('repeat') + '<span>跟读</span>';
el('navInterview').innerHTML = ic('chat') + '<span>面试</span>';
el('navGuide').innerHTML = ic('book') + '<span>思路</span>';
el('stopAllBtn').innerHTML = ic('stop') + ' 停止';
el('startBtn').innerHTML = ic('sparkle') + ' 开始 / 重新抽题';
el('emptyIcon').innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">${PATHS.chat}</svg>`;
el('fcBtns').innerHTML =
  `<button class="ibtn" onclick="playCurrentIv()" title="再听一遍" aria-label="再听一遍">${ic('volume')}</button>` +
  `<button class="ibtn rec" id="recBtn" onclick="toggleRecord()" title="录音" aria-label="录音">${ic('mic')}</button>` +
  `<button class="ibtn" id="ansBtn" onclick="toggleIvAnswer()" title="参考答案" aria-label="参考答案">${ic('eye')}</button>` +
  `<button class="ibtn primary" onclick="nextIvQuestion()" title="下一题" aria-label="下一题">${ic('arrow')}</button>`;
document.querySelector('.deck-arrow.prev').innerHTML = ic('chevL');
document.querySelector('.deck-arrow.next').innerHTML = ic('chevron');

function toast(msg) {
  el('toast').textContent = msg;
  el('toast').classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => el('toast').classList.remove('show'), 2600);
}

/* ---------- 音频可用性探测 ---------- */
async function probeAudio() {
  if (location.protocol === 'file:') return;
  const jobs = [];
  for (const sc of DATA.schools) for (const q of sc.questions) {
    for (const suf of ['', '-a']) {
      jobs.push(fetch(`audio/${q.id}${suf}.mp3?v=${AUDIO_CACHE_BUST}`, { method: 'HEAD' })
        .then(r => { audioKind[q.id + suf] = r.ok ? 'file' : 'tts'; })
        .catch(() => { audioKind[q.id + suf] = 'tts'; }));
    }
  }
  await Promise.allSettled(jobs);
  if (S.mode === 'shadow') renderDeck(true);
}

/* ---------- 播放（mp3 优先，TTS 兜底） ---------- */
let jaVoice = null;
function pickJaVoice() {
  const vs = speechSynthesis.getVoices().filter(v => v.lang.startsWith('ja'));
  jaVoice = vs.find(v => /otoya|keita|男/i.test(v.name)) || vs[0] || null;
}
if ('speechSynthesis' in window) {
  pickJaVoice();
  speechSynthesis.onvoiceschanged = pickJaVoice;
}

let activePlay = 0;   // 正在播放的会话 token；0 = 无播放
let loopMode = false; // 循环播放：播完当前卡自动滑到下一张

function stopAll() {
  playToken++;
  activePlay = 0;
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  if ('speechSynthesis' in window) speechSynthesis.cancel();
  document.querySelectorAll('.card.playing, .flashcard.playing').forEach(c => c.classList.remove('playing'));
}

function playOnce(id, text, suffix) {
  return new Promise(resolve => {
    if (audioKind[id + suffix] === 'file') {
      const a = new Audio(`audio/${id}${suffix}.mp3?v=${AUDIO_CACHE_BUST}`);
      a.playbackRate = S.rate;
      a.onended = resolve;
      a.onerror = () => speakTTS(text).then(resolve);
      currentAudio = a;
      a.play().catch(() => speakTTS(text).then(resolve));
    } else {
      speakTTS(text).then(resolve);
    }
  });
}
function speakTTS(text) {
  return new Promise(resolve => {
    if (!('speechSynthesis' in window)) { toast('此浏览器不支持语音合成'); resolve(); return; }
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ja-JP';
    if (jaVoice) u.voice = jaVoice;
    u.rate = S.rate;
    u.onend = resolve; u.onerror = resolve;
    speechSynthesis.speak(u);
  });
}
const sleep = ms => new Promise(r => setTimeout(r, ms));

async function playLoop(id, text, suffix, cardEl) {
  stopAll();
  const my = ++playToken;
  activePlay = my;
  if (cardEl) cardEl.classList.add('playing');
  for (let i = 0; i < S.repeat; i++) {
    if (my !== playToken) return false;
    await playOnce(id, text, suffix);
    if (i < S.repeat - 1) await sleep(S.gap * 1000);
  }
  if (cardEl) cardEl.classList.remove('playing');
  if (activePlay === my) activePlay = 0;
  return my === playToken;
}

function hasAnswer(q) {
  const ans = (q.a || '').trim();
  return ans && !ans.startsWith('（ここに');
}

async function playQuestionAndAnswer(id, cardEl) {
  stopAll();
  const my = ++playToken;
  activePlay = my;
  const q = QTEXT[id];
  if (cardEl) cardEl.classList.add('playing');
  for (let i = 0; i < S.repeat; i++) {
    if (my !== playToken) return false;
    await playOnce(id, q.q, '');
    if (my !== playToken) return false;
    if (hasAnswer(q)) {
      await sleep(650);
      if (my !== playToken) return false;
      await playOnce(id, q.a, '-a');
    }
    if (i < S.repeat - 1) await sleep(S.gap * 1000);
  }
  if (cardEl) cardEl.classList.remove('playing');
  if (activePlay === my) activePlay = 0;
  return my === playToken;
}

/* 播放当前卡片；循环模式下播完自动滑向下一张接着播 */
async function playCurrentCard() {
  const sc = currentSchool();
  const q = sc.questions[S.idx];
  const done = await playQuestionAndAnswer(q.id, el('card-' + q.id));
  if (!done || !loopMode || S.mode !== 'shadow') return;
  const n = sc.questions.length;
  await sleep(800);
  if (!loopMode || activePlay !== 0 || S.mode !== 'shadow') return;
  if (n === 1) { playCurrentCard(); return; }
  goTo((S.idx + 1) % n);   // 滑动停稳后由 scroll 监听器接力播放
}

function toggleLoop() {
  loopMode = !loopMode;
  document.querySelectorAll('.loopbtn').forEach(b => b.classList.toggle('toggled', loopMode));
  toast(loopMode ? '循环播放开启：播完自动下一题' : '循环播放已关闭');
  if (loopMode && activePlay === 0) playCurrentCard();
}

const QTEXT = {};
for (const sc of DATA.schools) for (const q of sc.questions) QTEXT[q.id] = q;
function currentSchool() { return DATA.schools.find(s => s.id === S.school); }

/* ---------- 顶栏 ---------- */
function renderTop() {
  const shadow = S.mode === 'shadow';
  el('chips').style.display = shadow ? '' : 'none';
  el('gearBtn').style.display = shadow ? '' : 'none';
  el('counterBtn').style.display = shadow ? '' : 'none';
  el('topTitle').textContent = shadow ? '面接コーチ' : (S.mode === 'interview' ? '模拟面试' : '回答思路');
  if (!shadow) return;
  el('chips').innerHTML = DATA.schools.map(sc =>
    `<button class="chip ${sc.id === S.school ? 'active' : ''}" onclick="switchSchool('${sc.id}')">${sc.name}</button>`
  ).join('');
  updateProgress();
}
function updateProgress() {
  const n = currentSchool().questions.length;
  el('counterBtn').innerHTML = `${S.idx + 1} / ${n} ${ic('grid')}`;
  const dots = el('dots');
  if (dots.children.length !== n) {
    dots.innerHTML = currentSchool().questions.map((q, i) =>
      `<button onclick="goTo(${i})" aria-label="第${i + 1}题"></button>`).join('');
  }
  [...dots.children].forEach((d, i) => d.classList.toggle('on', i === S.idx));
}
function switchSchool(id) {
  if (S.school === id) return;
  S.school = id; S.idx = 0;
  stopAll();
  renderTop();
  renderDeck();
  if (loopMode) setTimeout(playCurrentCard, 400);
}

/* ---------- 跟读：卡片组 ---------- */
function badgeFor(key) {
  if (audioKind[key] === 'file') return `<span class="badge hq">${ic('check')}高音質</span>`;
  return '<span class="badge">TTS</span>';
}
function renderDeck(keepPos) {
  const sc = currentSchool();
  el('deck').innerHTML = sc.questions.map((q, i) => {
    const ph = !hasAnswer(q);
    return `
    <article class="card" id="card-${q.id}">
      <div class="card-top">
        <span class="qnum">Q${i + 1}</span>
        ${badgeFor(q.id)}
      </div>
      <div class="card-q">${q.q}</div>
      <div class="card-ctrl">
        <button class="ibtn" ${ph ? 'disabled' : `onclick="playLoop('${q.id}', QTEXT['${q.id}'].a, '-a', el('card-${q.id}'))"`} title="只听答案" aria-label="只听答案">${ic('volume')}</button>
        <button class="ibtn big primary" onclick="playCurrentCard()" title="播放 问→答" aria-label="播放问题和答案">${ic('play')}</button>
        <button class="ibtn" onclick="stopAll()" title="停止" aria-label="停止">${ic('stop')}</button>
        <button class="ibtn loopbtn ${loopMode ? 'toggled' : ''}" onclick="toggleLoop()" title="循环播放：播完自动下一题" aria-label="循环播放">${ic('loop')}</button>
      </div>
      <div class="card-ans ${ph ? 'placeholder' : ''}"><span class="ans-label">MY ANSWER</span>${q.a || '（未填写答案）'}</div>
    </article>`;
  }).join('');
  requestAnimationFrame(() => scrollToCard(keepPos ? S.idx : 0, 'auto'));
}
function scrollToCard(i, behavior = 'smooth') {
  const deck = el('deck');
  const card = deck.children[i];
  if (!card) return;
  deck.scrollTo({ left: card.offsetLeft - (deck.clientWidth - card.clientWidth) / 2, behavior });
}
function goTo(i) {
  const n = currentSchool().questions.length;
  if (i < 0 || i >= n) return;
  scrollToCard(i);
}
/* 滑动后更新进度，切题时停止播放 */
let scrollT = null;
el('deck').addEventListener('scroll', () => {
  clearTimeout(scrollT);
  scrollT = setTimeout(() => {
    const deck = el('deck');
    const cards = deck.children;
    if (!cards.length) return;
    let best = 0, bestDist = Infinity;
    const center = deck.scrollLeft + deck.clientWidth / 2;
    for (let i = 0; i < cards.length; i++) {
      const d = Math.abs(cards[i].offsetLeft + cards[i].clientWidth / 2 - center);
      if (d < bestDist) { bestDist = d; best = i; }
    }
    if (best !== S.idx) {
      const wasPlaying = activePlay !== 0;
      S.idx = best;
      stopAll();
      // 划走时若在播放：无缝接上当前卡；循环模式下播完上一张滑过来也由这里接力
      if (wasPlaying || loopMode) playCurrentCard();
    }
    updateProgress();
  }, 80);
}, { passive: true });

document.addEventListener('keydown', e => {
  if (S.mode !== 'shadow') return;
  if (e.key === 'ArrowRight') goTo(S.idx + 1);
  if (e.key === 'ArrowLeft') goTo(S.idx - 1);
});

/* ---------- 抽屉 ---------- */
function openSheet(name) {
  if (name === 'overview') renderOverview();
  el('scrim').classList.add('open');
  el('sheet-' + name).classList.add('open');
}
function closeSheets() {
  el('scrim').classList.remove('open');
  document.querySelectorAll('.sheet').forEach(s => s.classList.remove('open'));
}
function renderOverview() {
  const sc = currentSchool();
  el('ovTitle').textContent = `${sc.name} · 共 ${sc.questions.length} 题`;
  el('ovBody').innerHTML = sc.questions.map((q, i) => `
    <button class="ov-item ${i === S.idx ? 'current' : ''}" onclick="jumpTo(${i})">
      <span class="n">Q${i + 1}</span>
      <span class="t">${q.q}</span>
      <span class="dot ${hasAnswer(q) ? 'ok' : ''}" title="${hasAnswer(q) ? '已写回答' : '占位'}"></span>
    </button>`).join('');
}
function jumpTo(i) {
  closeSheets();
  setTimeout(() => goTo(i), 120);
}

/* ---------- 模式切换 ---------- */
function setMode(m) {
  if (S.mode === m) return;
  S.mode = m;
  if (m !== 'shadow' && loopMode) {
    loopMode = false;
    document.querySelectorAll('.loopbtn').forEach(b => b.classList.remove('toggled'));
  }
  stopAll(); stopRecordingIfAny(); closeSheets();
  el('navShadow').classList.toggle('active', m === 'shadow');
  el('navInterview').classList.toggle('active', m === 'interview');
  el('navGuide').classList.toggle('active', m === 'guide');
  el('shadowView').style.display = m === 'shadow' ? '' : 'none';
  el('interviewView').style.display = m === 'interview' ? '' : 'none';
  el('guideView').style.display = m === 'guide' ? '' : 'none';
  if (m === 'guide' && !guideRendered) { renderGuide(); guideRendered = true; }
  if (m === 'shadow') { renderTop(); renderDeck(true); } else renderTop();
}

/* ---------- 回答思路 ---------- */
function renderBody(t) {
  const bold = s => s.replace(/\*\*(.+?)\*\*/g, '<b>$1</b>');
  let html = '', stack = [];
  const top = () => stack[stack.length - 1];
  const closeTo = n => { while (stack.length > n) html += (stack.pop() === 'ol' ? '</ol>' : '</ul>'); };
  for (const raw of t.split('\n')) {
    if (!raw.trim()) continue;
    let m;
    if (m = raw.match(/^(\d+)\.\s+(.*)/)) {
      if (top() === 'sub') { html += '</ul>'; stack.pop(); }
      if (top() !== 'ol') { closeTo(0); html += '<ol>'; stack.push('ol'); }
      html += '<li>' + bold(m[2]) + '</li>';
    } else if (m = raw.match(/^\s{2,}-\s+(.*)/)) {
      if (top() !== 'sub') { html += '<ul class="sub">'; stack.push('sub'); }
      html += '<li>' + bold(m[1]) + '</li>';
    } else if (m = raw.match(/^-\s+(.*)/)) {
      if (top() === 'sub') { html += '</ul>'; stack.pop(); }
      if (top() !== 'ul') { closeTo(0); html += '<ul>'; stack.push('ul'); }
      html += '<li>' + bold(m[1]) + '</li>';
    } else {
      closeTo(0); html += '<p>' + bold(raw) + '</p>';
    }
  }
  closeTo(0);
  return html;
}
function gRow(label, cls, inner) {
  return `<div class="g-row"><span class="g-tag ${cls}">${label}</span><div class="g-lines">${inner}</div></div>`;
}
function renderGuide() {
  const g = window.GUIDE_DATA;
  if (!g) { el('guideView').innerHTML = '<div class="empty">未找到 data/guide.js</div>'; return; }
  let html = `<div class="g-head"><h2>${ic('book')}${g.title}</h2><p>${g.note}</p></div>`;
  html += `<div class="g-toc">` +
    g.chapters.map((c, ci) => `<a href="#gch-${ci}">${ci + 1} · ${c.title}</a>`).join('') +
    `<button class="btn" onclick="toggleAllGuide(true)">全部展开</button>` +
    `<button class="btn" onclick="toggleAllGuide(false)">全部收起</button></div>`;
  g.chapters.forEach((c, ci) => {
    html += `<div class="g-chapter"><h3 id="gch-${ci}"><span class="cnum">${ci + 1}</span>${c.title}</h3>`;
    c.items.forEach((it, ii) => {
      html += `<details class="g-item"><summary><span class="gq">Q${ci + 1}.${ii + 1}</span>${it.title}<span class="arrow">${ic('chevron')}</span></summary><div class="g-body">`;
      html += gRow('中文', 'zh', it.zh.map(x => `<div>${x}</div>`).join(''));
      html += gRow('日文', 'ja', it.ja.map((x, k) =>
        `<div class="g-ja-line"><button class="play" title="播放" onclick="playGuideJa(${ci},${ii},${k})">${ic('volume')}</button><span>${x}</span></div>`).join(''));
      if (it.en && it.en.length) html += gRow('英文', 'en', it.en.map(x => `<div>${x}</div>`).join(''));
      if (it.intent) html += gRow('意图', 'intent', `<div>${it.intent}</div>`);
      for (const b of it.blocks) html += `<div class="g-block"><h4>${b.h}</h4>${renderBody(b.t)}</div>`;
      html += `</div></details>`;
    });
    html += `</div>`;
  });
  el('guideView').innerHTML = html;
}
function toggleAllGuide(open) {
  document.querySelectorAll('#guideView details.g-item').forEach(d => d.open = open);
}
function playGuideJa(ci, ii, k) {
  stopAll();
  speakTTS(window.GUIDE_DATA.chapters[ci].items[ii].ja[k]);
}

/* ---------- 模拟面试 ---------- */
let deckIv = [], deckPos = -1;
const takesByQ = {};

function startInterview() {
  const all = el('scope').value === 'all';
  deckIv = [];
  for (const sc of DATA.schools) {
    if (!all && sc.id !== S.school) continue;
    for (const q of sc.questions) deckIv.push({ ...q, school: sc.name });
  }
  for (let i = deckIv.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deckIv[i], deckIv[j]] = [deckIv[j], deckIv[i]];
  }
  deckPos = -1;
  el('ivStage').style.display = '';
  el('ivEmpty').style.display = 'none';
  nextIvQuestion();
}

function curIv() { return deckIv[deckPos]; }

async function nextIvQuestion() {
  stopAll(); stopRecordingIfAny();
  deckPos++;
  if (deckPos >= deckIv.length) {
    toast('本轮全部问题已抽完！点「开始」再来一轮');
    deckPos = deckIv.length - 1;
    return;
  }
  const q = curIv();
  el('fcProgress').textContent = `第 ${deckPos + 1} / ${deckIv.length} 题`;
  el('fcSchool').textContent = q.school;
  el('fcQ').textContent = q.q;
  el('ivAnswer').textContent = q.a || '（未填写答案）';
  el('ivAnswerBox').classList.add('hide');
  el('transcript').innerHTML = '';
  renderTakes();
  await playCurrentIv();
  if (el('autoRec').checked && deckIv[deckPos] === q) startRecording();
}

function playCurrentIv() {
  stopAll();
  const my = ++playToken;
  const q = curIv();
  return playOnce(q.id, q.q, '').then(() => { if (my !== playToken) throw 0; }).catch(() => {});
}

function toggleIvAnswer() { el('ivAnswerBox').classList.toggle('hide'); }

/* ---------- 录音 ---------- */
let mediaStream = null, recorder = null, chunks = [], recTimer = null, recStart = 0;
let recognition = null;

function fmtTime(s) { return `${String(Math.floor(s / 60)).padStart(2, '0')}:${String(s % 60).padStart(2, '0')}`; }

async function startRecording() {
  if (recorder && recorder.state === 'recording') return;
  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch (e) {
    toast('无法访问麦克风：请检查权限，且需通过 localhost 打开本页面');
    return;
  }
  const mime = ['audio/webm;codecs=opus', 'audio/webm', 'audio/mp4'].find(t => MediaRecorder.isTypeSupported(t)) || '';
  recorder = new MediaRecorder(mediaStream, mime ? { mimeType: mime } : undefined);
  chunks = [];
  recorder.ondataavailable = e => chunks.push(e.data);
  recorder.onstop = onRecordingStop;
  recorder.start();
  recStart = Date.now();
  const btn = el('recBtn');
  btn.classList.add('on');
  btn.title = btn.ariaLabel = '停止录音';
  recTimer = setInterval(() => {
    btn.innerHTML = `${ic('stop')}<span class="rec-timer">${fmtTime(Math.floor((Date.now() - recStart) / 1000))}</span>`;
  }, 250);
  btn.innerHTML = `${ic('stop')}<span class="rec-timer">00:00</span>`;
  startRecognition();
}

function stopRecordingIfAny() {
  if (recorder && recorder.state === 'recording') recorder.stop();
}
function toggleRecord() {
  (recorder && recorder.state === 'recording') ? recorder.stop() : startRecording();
}

function onRecordingStop() {
  clearInterval(recTimer);
  const btn = el('recBtn');
  btn.classList.remove('on');
  btn.innerHTML = ic('mic');
  btn.title = btn.ariaLabel = '录音';
  if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
  stopRecognition();
  const q = curIv();
  if (!q || !chunks.length) return;
  const blob = new Blob(chunks, { type: chunks[0].type || 'audio/webm' });
  const ext = (blob.type.includes('mp4')) ? 'm4a' : 'webm';
  const url = URL.createObjectURL(blob);
  if (!takesByQ[q.id]) takesByQ[q.id] = [];
  const n = takesByQ[q.id].length + 1;
  takesByQ[q.id].push({ url, name: `${q.id}_take${n}.${ext}` });
  renderTakes();
}

function renderTakes() {
  const q = curIv();
  const list = (q && takesByQ[q.id]) || [];
  el('takes').innerHTML = list.map((t, i) => `
    <div class="take">
      <span class="tnum">Take ${i + 1}</span>
      <audio controls src="${t.url}"></audio>
      <a href="${t.url}" download="${t.name}">${ic('download')} 下载</a>
    </div>`).join('');
}

/* ---------- 实时识别字幕（Chrome） ---------- */
function startRecognition() {
  if (!el('liveStt').checked) return;
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { toast('此浏览器不支持语音识别，请用 Chrome'); return; }
  recognition = new SR();
  recognition.lang = 'ja-JP';
  recognition.continuous = true;
  recognition.interimResults = true;
  let finalText = '';
  recognition.onresult = e => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) finalText += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    el('transcript').innerHTML = finalText + '<span class="interim">' + interim + '</span>';
  };
  recognition.onerror = () => {};
  try { recognition.start(); } catch (e) {}
}
function stopRecognition() {
  if (recognition) { try { recognition.stop(); } catch (e) {} recognition = null; }
}

/* ---------- 初始化 ---------- */
renderTop();
renderDeck();
probeAudio();
if (location.protocol === 'file:') {
  toast('提示：直接打开文件时无法使用高音质音频和录音，请双击 start.command 启动');
}
</script>
